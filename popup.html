<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ACG Website Filter</title>
    <style>
        body { font-family: Arial, sans-serif; min-width: 300px; padding: 10px; }
        h2 { font-size: 1.2em; margin-top: 0; }
        h3 { font-size: 1em; margin-top: 15px; }
        label, input, button { display: block; margin: 8px 0; }

        .info { font-size: 0.85em; color: #666; margin-top: 5px; }
        .unblock-section { border: 1px solid #ddd; padding: 10px; margin-bottom: 15px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="unblock-section">
        <label style="display: flex; align-items: center; justify-content: space-between; cursor: pointer; font-weight: bold; padding: 5px 0;">
            <span>Blocking Enabled</span>
            <input type="checkbox" id="extension-master-switch" checked style="width: 20px; height: 20px; margin: 0;">
        </label>
    </div>

    <h3>Blocked Keywords</h3>
    <p class="info">Links containing these keywords will be hidden on supported sites.</p>
    <input type="text" id="keyword-input" placeholder="Add keyword...">
    <button id="add-keyword">Add Keyword</button>

    <script src="popup.js"></script>
</body>
</html>
